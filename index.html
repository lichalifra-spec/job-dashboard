<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Job Dashboard</title>
<style>
:root{--bg:#0f1420;--card:#182234;--card2:#1f2b40;--tx:#e8eef7;--mut:#93a3bd;--ac:#5b9dff;--ok:#31c48d;--warn:#f6c445;--bad:#f0616d}
*{box-sizing:border-box}body{margin:0;font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--tx)}
.wrap{max-width:760px;margin:0 auto;padding:16px}
h1{font-size:20px;margin:4px 0 2px}.sub{color:var(--mut);font-size:12px;margin-bottom:14px}
#login{max-width:340px;margin:16vh auto;text-align:center;padding:0 16px}
input{width:100%;padding:13px;border-radius:12px;border:1px solid #2a3a55;background:#111a2b;color:var(--tx);font-size:16px}
button{margin-top:10px;width:100%;padding:13px;border:0;border-radius:12px;background:var(--ac);color:#fff;font-size:16px;font-weight:600}
.err{color:var(--bad);font-size:13px;margin-top:8px;min-height:18px}
h2{font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);margin:22px 0 8px}
.card{background:var(--card);border:1px solid #26344c;border-radius:14px;padding:13px 14px;margin-bottom:10px}
.card.next{border-color:var(--ac);box-shadow:0 0 0 1px var(--ac)}
.row{display:flex;justify-content:space-between;gap:8px;align-items:baseline}
.co{font-weight:700;font-size:16px}.role{color:var(--mut);font-size:13px}
.when{font-size:13px;color:var(--tx);white-space:nowrap}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;margin:6px 6px 0 0}
.s-scheduled{background:#20406a;color:#cfe1ff}.s-applied{background:#1d4a3a;color:#b7f0d8}.s-needs_user,.s-needs_scheduling,.s-blocked{background:#5a3a12;color:#ffe0a3}
.s-default{background:#33415c;color:#cdd8ea}
.kv{margin-top:9px;font-size:13.5px}.kv b{color:var(--ac);font-weight:600}
.meet{display:inline-block;margin-top:9px;font-size:13px;color:#bcd6ff;text-decoration:none;border:1px solid #33507d;padding:6px 10px;border-radius:10px}
a{color:#8fc0ff}.mut{color:var(--mut)}
table{width:100%;border-collapse:collapse;font-size:13px}td,th{text-align:left;padding:7px 6px;border-bottom:1px solid #26344c;vertical-align:top}th{color:var(--mut);font-weight:600}
</style></head><body>
<div id="login">
  <h1>🔒 Job Dashboard</h1>
  <p class="sub">Ingresá tu contraseña</p>
  <input id="pw" type="password" autocomplete="current-password" placeholder="contraseña" />
  <button id="go">Entrar</button>
  <div class="err" id="err"></div>
</div>
<div class="wrap" id="app" style="display:none"></div>

const b2b=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function decrypt(pw){
  const salt=b2b(PAYLOAD.salt),iv=b2b(PAYLOAD.iv),ct=b2b(PAYLOAD.ct);
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:200000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
  return JSON.parse(new TextDecoder().decode(pt));
}
const esc=s=>(s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const fmtDate=(d,t)=>{if(!d)return t||'(sin fecha)';try{const dt=new Date(d+'T00:00:00');const dd=dt.toLocaleDateString('es-AR',{weekday:'short',day:'numeric',month:'short'});return dd+(t?' · '+t:'');}catch(e){return d+(t?' '+t:'');}};
const fmtDateTime=s=>{if(!s)return'';try{const d=new Date(s);return d.toLocaleString('es-AR',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});}catch(e){return s;}};
const sClass=s=>['scheduled','applied','needs_user','needs_scheduling','blocked'].includes(s)?'s-'+s:'s-default';
function render(data){
  document.getElementById('login').style.display='none';
  const app=document.getElementById('app');app.style.display='block';
  const now=new Date();
  const iv=(data.interviews||[]).slice().sort((a,b)=>((a.date||'9999')+(a.time||'')).localeCompare((b.date||'9999')+(b.time||'')));
  const upcoming=iv.filter(x=>x.date&&new Date(x.date+'T23:59')>=now);
  let h='<h1>📋 Job Dashboard</h1><div class="sub">Actualizado: '+esc(new Date(data.generatedAt).toLocaleString('es-AR'))+' · el calendar sigue siendo tu fuente oficial</div>';
  h+='<h2>Entrevistas</h2>';
  if(!iv.length)h+='<div class="mut">Sin entrevistas cargadas.</div>';
  iv.forEach((x,i)=>{
    const isNext=upcoming.length&&x===upcoming[0];
    h+='<div class="card'+(isNext?' next':'')+'">';
    h+='<div class="row"><span class="co">'+esc(x.company)+'</span><span class="when">'+esc(fmtDate(x.date,x.time))+'</span></div>';
    h+='<div class="role">'+esc(x.role)+(x.stage?' · '+esc(x.stage):'')+'</div>';
    h+='<span class="tag '+sClass(x.status)+'">'+esc(x.status||'')+'</span>'+(isNext?'<span class="tag s-scheduled">PRÓXIMA</span>':'');
    if(x.contact_name)h+='<div class="kv"><b>Con:</b> '+esc(x.contact_name)+(x.contact_email?' ('+esc(x.contact_email)+')':'')+'</div>';
    if(x.what_they_want)h+='<div class="kv"><b>Qué piden:</b> '+esc(x.what_they_want)+'</div>';
    if(x.prep_notes)h+='<div class="kv"><b>Prep:</b> '+esc(x.prep_notes)+'</div>';
    if(x.my_pitch&&x.my_pitch!=='-')h+='<div class="kv"><b>Qué decir:</b> '+esc(x.my_pitch)+'</div>';
    if(x.notes)h+='<div class="kv mut">'+esc(x.notes)+'</div>';
    const meet=(x.notes||'').match(/https:\/\/meet\.google\.com\/[a-z-]+/);
    if(meet)h+='<a class="meet" href="'+meet[0]+'">🎥 Unirse al Meet</a>';
    h+='</div>';
  });
  const cal=(data.calendar||[]).filter(e=>e.start&&new Date(e.start)>=new Date());
  if(cal.length){
    h+='<h2>Próximos eventos (Calendar)</h2>';
    cal.forEach(e=>{
      h+='<div class="card"><div class="row"><span class="co" style="font-size:14px">'+esc(e.summary)+'</span><span class="when">'+esc(fmtDateTime(e.start))+'</span></div>';
      if(e.attendees)h+='<div class="kv mut">'+esc(e.attendees)+'</div>';
      if(e.link&&/^https/.test(e.link))h+='<a class="meet" href="'+esc(e.link)+'">🎥 Abrir</a>';
      h+='</div>';
    });
  }
  const apps=(data.applications||[]);
  const applied=apps.filter(a=>a.status==='applied').length;
  h+='<h2>Aplicaciones ('+applied+' enviadas / '+apps.length+' totales)</h2>';
  apps.forEach(a=>{
    h+='<div class="card"><div class="row"><span class="co" style="font-size:15px">'+esc(a.company)+'</span><span class="tag '+sClass(a.status)+'">'+esc(a.status)+'</span></div>';
    h+='<div class="role">'+esc(a.role)+(a.ats?' · '+esc(a.ats):'')+(a.date_applied?' · '+esc(a.date_applied):'')+'</div>';
    if(a.next_action&&!/esperar respuesta/i.test(a.next_action))h+='<div class="kv"><b>Próx:</b> '+esc(a.next_action)+'</div>';
    if(a.notes&&['needs_user','blocked','needs_scheduling'].includes(a.status))h+='<div class="kv mut">'+esc(a.notes)+'</div>';
    h+='</div>';
  });
  app.innerHTML=h;
}
async function attempt(){const pw=document.getElementById('pw').value;const e=document.getElementById('err');e.textContent='';try{const d=await decrypt(pw);sessionStorage.setItem('pw',pw);render(d);}catch(_){e.textContent='Contraseña incorrecta.';}}
document.getElementById('go').onclick=attempt;
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')attempt();});
const sp=sessionStorage.getItem('pw');if(sp){decrypt(sp).then(render).catch(()=>{});}
document.getElementById('pw').focus();
</script></body></html>
